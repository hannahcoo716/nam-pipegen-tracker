<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAM Pipegen Tracker 2026</title>
<style>
:root { color-scheme: light; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f6f7fb;
  color: #323338;
  font-size: 13px;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 1px solid #e6e9ef;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.monday-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 800;
  color: #323338;
  letter-spacing: -0.3px;
}
.header-divider { width: 1px; height: 28px; background: #e6e9ef; }
.header-title { font-size: 15px; font-weight: 700; color: #323338; }
.header-sub { font-size: 11px; color: #676879; margin-top: 1px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.refresh-badge {
  background: #e9f0ff;
  color: #0073ea;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── Summary bar ── */
.summary-bar {
  background: #fff;
  border-bottom: 1px solid #e6e9ef;
  padding: 14px 24px;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.summary-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 0 28px 0 0;
  margin-right: 28px;
  border-right: 1px solid #e6e9ef;
}
.summary-item:last-child { border-right: none; margin-right: 0; }
.summary-label {
  font-size: 10px;
  font-weight: 700;
  color: #676879;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.summary-value {
  font-size: 22px;
  font-weight: 800;
  color: #323338;
  line-height: 1.1;
}
.summary-sub { font-size: 11px; color: #676879; }

/* ── Month tabs ── */
.controls {
  padding: 12px 24px;
  background: #fff;
  border-bottom: 1px solid #e6e9ef;
  display: flex;
  align-items: center;
  gap: 8px;
}
.controls-label {
  font-size: 11px;
  font-weight: 700;
  color: #676879;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
  white-space: nowrap;
}
.month-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.month-tab {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #e6e9ef;
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #676879;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.month-tab:hover { background: #e9f0ff; border-color: #c5d9ff; color: #0073ea; }
.month-tab.active {
  background: #0073ea;
  color: #fff;
  border-color: #0073ea;
}

/* ── Table wrap ── */
.table-wrap { padding: 16px 24px; overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  min-width: 900px;
}

/* ── Table header ── */
thead tr th {
  background: #f0f2f8;
  color: #676879;
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  text-align: right;
  white-space: nowrap;
  border-bottom: 2px solid #e6e9ef;
  border-right: 1px solid #e6e9ef;
}
thead tr th:first-child {
  text-align: left;
  min-width: 240px;
  border-left: none;
}
thead tr th:last-child { border-right: none; }

/* col groups */
.th-group-sep { border-left: 2px solid #c5d9ff !important; }

/* ── Table rows ── */
td {
  padding: 9px 12px;
  text-align: right;
  border-bottom: 1px solid #f0f2f8;
  border-right: 1px solid #f0f2f8;
  white-space: nowrap;
  font-size: 12px;
  vertical-align: middle;
  transition: background 0.1s;
}
td:first-child { text-align: left; }
td:last-child { border-right: none; }
.td-group-sep { border-left: 2px solid #e6e9ef !important; }

tr.row-rvp td { background: #f3f4ff; font-weight: 700; font-size: 12px; }
tr.row-flm td { background: #f8f9ff; font-weight: 600; }
tr.row-mgr td { background: #fdfdff; font-weight: 500; }
tr.row-rep td { background: #fff; color: #323338; font-weight: 400; }

tr:hover td { background: #eef4ff !important; }

/* ── Name cell ── */
.name-cell {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  user-select: none;
}
.name-cell.no-click { cursor: default; }
.toggle-icon {
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-size: 9px;
  color: #676879;
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.toggle-icon.open { transform: rotate(90deg); }
.toggle-spacer { width: 16px; flex-shrink: 0; }

.indent-1 { padding-left: 20px !important; }
.indent-2 { padding-left: 40px !important; }
.indent-3 { padding-left: 60px !important; }

/* ── Level badges ── */
.badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  white-space: nowrap;
}
.badge-rvp { background: #ede2ff; color: #7b3fcc; }
.badge-flm { background: #d4edff; color: #0065b3; }
.badge-mgr { background: #d4f5e9; color: #007a5a; }
.badge-rep { background: #f0f2f8; color: #676879; }
.badge-ramp { background: #fff3cd; color: #856404; }

/* ── Attainment pills ── */
.pill {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 11px;
  white-space: nowrap;
}
.pill-green  { background: #d4f5e9; color: #007a5a; }
.pill-yellow { background: #fef3dc; color: #b36800; }
.pill-red    { background: #ffe5e9; color: #c4214c; }
.pill-none   { background: #f0f2f8; color: #676879; }

/* ── Week cells ── */
.wk { font-size: 11px; color: #676879; }
.wk.partial { color: #0073ea; font-weight: 600; }

/* ── Empty state ── */
.empty { text-align: center; padding: 40px; color: #676879; font-size: 13px; }

/* ── Legend ── */
.legend {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 10px 24px 4px;
  font-size: 11px;
  color: #676879;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
</style>
</head>

    s.pg_target    += r.pg_target    || 0;
    s.wk_pg_target += r.wk_pg_target || 0;
    s.bnb_target   += r.bnb_target   || 0;
    s.actual       += r.actual       || 0;
    const q = r.quota || 0;
    wr_wsum += (r.ep_win_rate || r.win_rate || 0) * q;
    q_sum   += q;
  }
  s.ep_win_rate = q_sum > 0 ? wr_wsum / q_sum : 0;
  // Aggregate weeksData by position
  if (rows.length > 0 && rows[0].weeksData && rows[0].weeksData.length > 0) {
    const nWks = rows[0].weeksData.length;
    for (let i = 0; i < nWks; i++) {
      const wd0 = rows[0].weeksData[i];
      let act = 0, tgt = 0;
      for (const r of rows) {
        const wd = r.weeksData && r.weeksData[i];
        if (wd) { act += wd.actual || 0; tgt += wd.target || 0; }
      }
      s.weeksData.push({ label: wd0.label, actual: act, target: tgt, monthStart: wd0.monthStart });
    }
  }
  return s;
}

// ─────────────────────────────────────────────────────────────────────────────
// Build rows
// ─────────────────────────────────────────────────────────────────────────────
function buildMonthRows(month) {
  return REP_DATA
    .filter(r => r.months[month])
    .map(r => {
      const m = r.months[month];
      const pgt = pgTarget(m);
      const nWks = MAX_WK[month] || 4;
      const weeksData = [];
      for (let w = 1; w <= nWks; w++) {
        weeksData.push({ label: `Wk ${w}`, actual: m[`w${w}`], target: pgt / 4, monthStart: false });
      }
      return {
        rvp: r.rvp, flm: r.flm, manager: r.manager, rep: r.rep,
        role: r.role, ramp: r.ramp, ep_win_rate: r.ep_win_rate || r.win_rate,
        quota: m.quota, pg_target: pgt, wk_pg_target: pgt / 4, bnb_target: m.bnb_target || 0,
        actual: m.actual, weeksData,
      };
    });
}

function buildQuarterRows(qKey) {
  const qDef = QUARTERS.find(q => q.key === qKey);
  const repMap = {};
  for (const mo of qDef.months) {
    for (const r of buildMonthRows(mo)) {
      const key = `${r.rvp}||${r.flm}||${r.manager}||${r.rep}`;
      if (!repMap[key]) {
        repMap[key] = {
          rvp: r.rvp, flm: r.flm, manager: r.manager, rep: r.rep,
          role: r.role, ramp: r.ramp,
          quota: 0, pg_target: 0, actual: 0,
          _wr_wsum: 0, _q_sum: 0, weeksData: [],
        };
      }
      const agg = repMap[key];
      agg.quota     += r.quota     || 0;
      agg.pg_target += r.pg_target || 0;
      agg.actual    += r.actual    || 0;
      agg._wr_wsum  += (r.win_rate || 0) * (r.quota || 0);
      agg._q_sum    += r.quota     || 0;
      const nWks = MAX_WK[mo] || 4;
      for (let w = 1; w <= nWks; w++) {
        agg.weeksData.push({
          label: `${MONTH_SHORT[mo]} W${w}`,
          actual: r.weeksData[w - 1] ? r.weeksData[w - 1].actual : null,
          target: r.wk_pg_target,
          monthStart: w === 1,
        });
      }
    }
  }
  return Object.values(repMap).map(r => {
    r.win_rate     = r._q_sum > 0 ? r._wr_wsum / r._q_sum : 0;
    r.wk_pg_target = r.weeksData.length > 0 ? r.pg_target / r.weeksData.length : 0;
    return r;
  });
}

function buildRows() {
  return activeView.type === 'month'
    ? buildMonthRows(activeView.key)
    : buildQuarterRows(activeView.key);
}

// ─────────────────────────────────────────────────────────────────────────────
// Segment target cell
// ─────────────────────────────────────────────────────────────────────────────
function segTargetCell(rvpName, isRvp) {
  if (!isRvp) return '<td></td>';
  let segs = {};
  if (activeView.type === 'month') {
    segs = (SEG_TARGETS[rvpName] || {})[activeView.key] || {};
  } else {
    const qDef = QUARTERS.find(q => q.key === activeView.key);
    for (const mo of qDef.months) {
      const ms = (SEG_TARGETS[rvpName] || {})[mo] || {};
      for (const [seg, val] of Object.entries(ms))
        segs[seg] = (segs[seg] || 0) + val;
    }
  }
  const entries = Object.entries(segs);
  if (!entries.length) return '<td>—</td>';
  const parts = entries.map(([seg, val]) => {
    const short = seg === 'SMB & Growth' ? 'SMB' : seg === 'Mid-Market' ? 'MM' : seg;
    const fv = val >= 1000000 ? '$' + (val/1000000).toFixed(1) + 'M' : '$' + Math.round(val/1000) + 'K';
    return `<span style="white-space:nowrap"><strong>${short}:</strong> ${fv}</span>`;
  });
  return `<td style="font-size:11px;color:#323338;">${parts.join('<br>')}</td>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Cell renderers
// ─────────────────────────────────────────────────────────────────────────────
function attainBar(att) {
  if (att === null || isNaN(att) || !att)
    return '<div style="color:#c5cdd8;font-size:11px;">—</div>';
  const fillPct   = Math.min(att / 1.5 * 100, 100).toFixed(1);
  const color      = att >= 1.0 ? '#00c875' : att >= 0.75 ? '#fdab3d' : '#e2445c';
  const trackColor = att >= 1.0 ? '#d4f5e9' : att >= 0.75 ? '#fef3dc' : '#ffe5e9';
  const markerPos  = (1 / 1.5 * 100).toFixed(1);
  return `<div style="display:flex;align-items:center;gap:6px;min-width:120px;">
    <div style="flex:1;height:6px;background:${trackColor};border-radius:3px;position:relative;">
      <div style="width:${fillPct}%;height:100%;background:${color};border-radius:3px;"></div>
      <div style="position:absolute;top:-3px;left:${markerPos}%;width:1.5px;height:12px;background:rgba(50,51,56,0.2);border-radius:1px;" title="100% target"></div>
    </div>
    <span class="${pillClass(att)}" style="flex-shrink:0;">${fmtPct(att)}</span>
  </div>`;
}

function wkCell(wk) {
  if (!wk || wk.actual === null || wk.actual === undefined)
    return '<span class="wk">—</span>';
  const val = fmt(wk.actual);
  const att = (wk.target > 0) ? wk.actual / wk.target : null;
  if (att === null || isNaN(att))
    return `<span class="wk">${val}</span>`;
  const color = att >= 1.0 ? '#007a5a' : att >= 0.75 ? '#b36800' : '#c4214c';
  return `<div>
    <span class="wk">${val}</span>
    <div style="font-size:10px;color:${color};font-weight:700;line-height:1.5;">${fmtPct(att)}</div>
  </div>`;
}

function metricsCell(s, showWR, rvpName, isRvp) {
  const att   = s.pg_target > 0 ? s.actual / s.pg_target : null;
  rvpName     = rvpName || '';
  isRvp       = isRvp   || false;
  const weekCells = (s.weeksData || []).map((wk, i) => {
    const sepCls = (activeView.type === 'quarter' && wk.monthStart && i > 0)
      ? ' class="td-group-sep"' : '';
    return `<td${sepCls}>${wkCell(wk)}</td>`;
  }).join('');
  return `
    <td>${fmt(s.quota)}</td>
    ${segTargetCell(rvpName, isRvp)}
    <td class="td-group-sep">${fmt(s.pg_target)}</td>
    <td>${fmt(s.wk_pg_target)}</td>
    <td class="td-group-sep">${fmt(s.actual)}</td>
    <td style="min-width:150px;">${attainBar(att)}</td>
    ${weekCells}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// Dynamic header
// ─────────────────────────────────────────────────────────────────────────────
function renderHeader() {
  let wkHtml = '';
  if (activeView.type === 'month') {
    const nWks = MAX_WK[activeView.key] || 4;
    for (let w = 1; w <= nWks; w++)
      wkHtml += `<th${w === 1 ? ' class="th-group-sep"' : ''}>Wk ${w}</th>`;
  } else {
    const qDef = QUARTERS.find(q => q.key === activeView.key);
    let first = true;
    for (const mo of qDef.months) {
      const nWks = MAX_WK[mo] || 4;
      for (let w = 1; w <= nWks; w++) {
        const sep = (w === 1 && !first) ? ' class="th-group-sep"' : (w === 1 ? ' class="th-group-sep"' : '');
        wkHtml += `<th${sep}>${MONTH_SHORT[mo]} W${w}</th>`;
        first = false;
      }
    }
  }
  const periodLabel = activeView.type === 'quarter' ? 'Qtly' : 'Monthly';
  document.querySelector('#mainTable thead tr').innerHTML = `
    <th>Name</th>
    <th title="ARR quota">${activeView.type === 'quarter' ? 'Qtly Quota' : 'Quota'}</th>
    <th title="Segment-level quota">Seg Target</th>
    <th class="th-group-sep" title="Pipegen target">Pipegen Target</th>
    <th title="Weekly pipegen target">Wk Target</th>
    <th class="th-group-sep" title="Actual pipegen">Actual Pipegen</th>
    <th title="Attainment vs pipegen target">${periodLabel} Att.</th>
    ${wkHtml}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// Render table
// ─────────────────────────────────────────────────────────────────────────────
function renderTable() {
  renderHeader();
  const rows = buildRows();
  const body = document.getElementById('tableBody');
  const tree = {};
  for (const r of rows) {
    if (!tree[r.rvp]) tree[r.rvp] = {};
    if (!tree[r.rvp][r.flm]) tree[r.rvp][r.flm] = {};
    if (!tree[r.rvp][r.flm][r.manager]) tree[r.rvp][r.flm][r.manager] = [];
    tree[r.rvp][r.flm][r.manager].push(r);
  }
  let html = '';
  for (const rvpName of Object.keys(tree).sort()) {
    const rvpAll = [];
    for (const f of Object.values(tree[rvpName])) for (const m of Object.values(f)) rvpAll.push(...m);
    const rvpSum = sumRows(rvpAll);
    const rvpKey = 'rvp__' + rvpName;
    const rvpOpen = expanded.rvp.has(rvpKey);
    html += `<tr class="row-rvp" onclick="toggle('rvp','${rvpKey}')" style="cursor:pointer">
      <td><div class="name-cell"><span class="toggle-icon ${rvpOpen?'open':''}">▶</span>
        <span class="badge badge-rvp">RVP</span><strong>${rvpName}</strong></div></td>
      ${metricsCell(rvpSum, true, rvpName, true)}</tr>`;
    if (rvpOpen) {
      for (const flmName of Object.keys(tree[rvpName]).sort()) {
        const flmAll = [];
        for (const m of Object.values(tree[rvpName][flmName])) flmAll.push(...m);
        const flmSum = sumRows(flmAll);
        const flmKey = 'flm__' + rvpName + '__' + flmName;
        const flmOpen = expanded.flm.has(flmKey);
        html += `<tr class="row-flm" onclick="toggle('flm','${flmKey}')" style="cursor:pointer">
          <td class="indent-1"><div class="name-cell"><span class="toggle-icon ${flmOpen?'open':''}">▶</span>
            <span class="badge badge-flm">FLM</span>${flmName}</div></td>
          ${metricsCell(flmSum, true)}</tr>`;
        if (flmOpen) {
          for (const mgrName of Object.keys(tree[rvpName][flmName]).sort()) {
            const mgrRows = tree[rvpName][flmName][mgrName];
            const mgrSum = sumRows(mgrRows);
            const mgrKey = 'mgr__' + rvpName + '__' + flmName + '__' + mgrName;
            const mgrOpen = expanded.mgr.has(mgrKey);
            html += `<tr class="row-mgr" onclick="toggle('mgr','${mgrKey}')" style="cursor:pointer">
              <td class="indent-2"><div class="name-cell"><span class="toggle-icon ${mgrOpen?'open':''}">▶</span>
                <span class="badge badge-mgr">MGR</span>${mgrName}</div></td>
              ${metricsCell(mgrSum, true)}</tr>`;
            if (mgrOpen) {
              for (const rep of mgrRows) {
                const rb = rep.ramp === 'Ramping'
                  ? `<span class="badge badge-ramp" style="margin-left:4px">RAMP</span>` : '';
                html += `<tr class="row-rep">
                  <td class="indent-3"><div class="name-cell no-click">
                    <span class="toggle-spacer"></span>
                    <span class="badge badge-rep">REP</span>${rep.rep}${rb}
                    <span style="font-size:10px;color:#9699a6;margin-left:4px;">${rep.role}</span>
                  </div></td>
                  ${metricsCell(rep, true)}</tr>`;
              }
            }
          }
        }
      }
    }
  }
  body.innerHTML = html || `<tr><td colspan="20" class="empty">No data for this period.</td></tr>`;
}

function toggle(level, key) {
  const s = expanded[level];
  if (s.has(key)) s.delete(key); else s.add(key);
  renderTable();
}

// ─────────────────────────────────────────────────────────────────────────────
// Tabs
// ─────────────────────────────────────────────────────────────────────────────
function renderMonthTabs() {
  const mHtml = MONTHS.map(m =>
    `<button class="month-tab ${activeView.type==='month'&&activeView.key===m.key?'active':''}"
      onclick="selectView('month','${m.key}')">${m.label}</button>`
  ).join('');
  const qHtml = QUARTERS.map(q =>
    `<button class="month-tab ${activeView.type==='quarter'&&activeView.key===q.key?'active':''}"
      onclick="selectView('quarter','${q.key}')">${q.label}</button>`
  ).join('');
  document.getElementById('monthTabs').innerHTML =
    mHtml +
    `<span style="width:1px;background:#e6e9ef;margin:0 6px;align-self:stretch;display:inline-block;"></span>` +
    qHtml;
}

function selectView(type, key) {
  activeView = { type, key };
  renderMonthTabs();
  renderSummary();
  renderTable();
}

// ─────────────────────────────────────────────────────────────────────────────
// Summary bar
// ─────────────────────────────────────────────────────────────────────────────
function renderSummary() {
  const rows  = buildRows();
  const total = sumRows(rows);
  const att   = total.pg_target > 0 ? total.actual / total.pg_target : 0;
  const color = attainColor(att);
  const label = activeView.type === 'month'
    ? (MONTHS.find(m => m.key === activeView.key)?.label || activeView.key)
    : (QUARTERS.find(q => q.key === activeView.key)?.label || activeView.key);
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">
      <div class="summary-label">Period</div>
      <div class="summary-value" style="font-size:18px;font-weight:700;">${label}</div>
      <div class="summary-sub">${rows.length} active reps</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">${activeView.type==='quarter'?'Qtly Quota':'Total Quota'}</div>
      <div class="summary-value">${fmt(total.quota)}</div>
      <div class="summary-sub">ARR target</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Pipegen Target</div>
      <div class="summary-value">${fmt(total.pg_target)}</div>
      <div class="summary-sub">EP-based model</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Actual Pipegen</div>
      <div class="summary-value">${fmt(total.actual)}</div>
      <div class="summary-sub">WoW added ARR</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Attainment</div>
      <div class="summary-value" style="color:${color}">${fmtPct(att)}</div>
      <div class="summary-sub">vs pipegen target</div>
    </div>
  `;
}

// ── Init ──
function init() {
  activeView = { type: 'month', key: CURRENT_MONTH };
  renderMonthTabs();
  renderSummary();
  renderTable();
  document.getElementById('lastUpdated').textContent = 'Live data · Last refreshed: June 15, 2026';
}

init();
</script>
</body>
</html>
